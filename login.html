<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Smart Learning Hub</title>
    <meta name="description" content="Login to your Smart Learning Hub account to access personalized study materials and roadmaps.">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .login-page {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 2rem;
            background: radial-gradient(circle at top right, rgba(79, 70, 229, 0.2), transparent 40%),
                        radial-gradient(circle at bottom left, rgba(147, 51, 234, 0.2), transparent 40%);
        }

        .login-container {
            background: var(--card-bg);
            border: 1px solid var(--glass-border);
            padding: 3rem;
            border-radius: 24px;
            width: 100%;
            max-width: 450px;
            backdrop-filter: blur(20px);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        .login-container h2 {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
        }

        .login-container p {
            color: var(--text-secondary);
            margin-bottom: 2.5rem;
        }

        .input-group {
            position: relative;
            margin-bottom: 1.5rem;
            text-align: left;
        }

        .input-group i {
            position: absolute;
            left: 1.2rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-secondary);
            font-size: 1.1rem;
        }

        .input-group input {
            width: 100%;
            padding: 1.2rem 1rem 1.2rem 3.5rem;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            color: var(--text-primary);
            font-size: 1rem;
            transition: var(--transition);
        }

        .input-group input:focus {
            outline: none;
            border-color: var(--primary);
            background: rgba(0, 0, 0, 0.4);
            box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.15);
        }

        .options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2.5rem;
            font-size: 0.95rem;
        }

        .options label {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            cursor: pointer;
            color: var(--text-secondary);
        }

        .options a {
            color: var(--accent);
            text-decoration: none;
            transition: var(--transition);
        }

        .options a:hover {
            color: var(--primary);
            text-decoration: underline;
        }

        .btn-submit {
            width: 100%;
            padding: 1.2rem;
            border-radius: 12px;
            font-size: 1.1rem;
            margin-bottom: 2rem;
            cursor: pointer;
        }

        .register-link {
            color: var(--text-secondary);
        }

        .register-link a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
        }

        .register-link a:hover {
            text-decoration: underline;
        }
        
        .back-home {
            position: absolute;
            top: 2rem;
            left: 2rem;
            color: var(--text-secondary);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-weight: 500;
            transition: var(--transition);
            background: rgba(255,255,255,0.05);
            padding: 0.8rem 1.5rem;
            border-radius: 30px;
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(10px);
        }
        
        .back-home:hover {
            color: var(--text-primary);
            transform: translateX(-5px);
            background: rgba(255,255,255,0.1);
        }

        @media (max-width: 600px) {
            .back-home {
                top: 1rem;
                left: 1rem;
                padding: 0.5rem 1rem;
                font-size: 0.9rem;
            }
            .login-container {
                padding: 2rem;
            }
        }
    </style>
</head>
<body>
    <a href="index.html" class="back-home">
        <i class="fa-solid fa-arrow-left"></i> Back
    </a>
    <div class="login-page">
        <div class="login-container fade-in">
            <div style="margin-bottom: 2rem;">
                <span class="gradient-text" style="font-size: 1.5rem;">Smart</span><span style="font-size: 1.5rem; font-weight: 800;">Learning</span>
            </div>
            <h2>Welcome <span class="gradient-text">Back</span></h2>
            <p>Enter your credentials to continue</p>
            
            <form id="login-form">
                <div class="input-group">
                    <i class="fa-solid fa-envelope"></i>
                    <input type="email" id="email" placeholder="University Email Address" required>
                </div>
                <div class="input-group">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" id="password" placeholder="Password" required>
                </div>
                
                <div class="options">
                    <label>
                        <input type="checkbox"> Remember me
                    </label>
                    <a href="#">Forgot Password?</a>
                </div>
                
                <button type="submit" class="btn-primary btn-submit">Sign In</button>
            </form>
            
            <div class="register-link">
                Don't have an account? <a href="register.html">Register here</a>
            </div>
        </div>
    </div>
    <script>
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const submitBtn = document.querySelector('.btn-submit');
            
            submitBtn.textContent = 'Signing In...';
            
            try {
                const response = await fetch('http://localhost:5000/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    // Success Path - Can redirect securely
                    submitBtn.textContent = 'Success!';
                    submitBtn.style.background = 'linear-gradient(135deg, #10b981, #059669)';
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 500);
                } else {
                    // Error path
                    alert('Login Failed: ' + data.message);
                    submitBtn.textContent = 'Sign In';
                }
            } catch (error) {
                alert('Server error. Make sure the Node.js backend is running on port 5000!');
                submitBtn.textContent = 'Sign In';
            }
        });
    </script>
</body>
</html>
